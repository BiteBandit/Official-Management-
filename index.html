<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusive Membership | Elite Access</title>
  
  <!-- Google Fonts for Luxury Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind Custom Configuration -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            cinzel: ['Cinzel', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          animation: {
            'gradient-x': 'gradient-x 15s ease infinite',
            'fade-in-up': 'fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            'gradient-x': {
              '0%, 100%': {
                'background-size': '200% 200%',
                'background-position': 'left center'
              },
              '50%': {
                'background-size': '200% 200%',
                'background-position': 'right center'
              }
            },
            'fadeInUp': {
              '0%': { opacity: '0', transform: 'translateY(40px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center relative overflow-hidden font-sans selection:bg-amber-500 selection:text-black">

  <!-- Dynamic Ambient Background -->
  <div class="absolute inset-0 bg-gradient-to-br from-black via-zinc-950 to-amber-900/20 animate-gradient-x z-0"></div>

  <!-- Subtle Background Glow Orbs for Depth -->
  <div class="absolute top-0 left-1/4 w-96 h-96 bg-amber-600/10 rounded-full blur-[120px] animate-pulse-slow z-0 pointer-events-none"></div>
  <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-yellow-500/10 rounded-full blur-[120px] animate-pulse-slow delay-1000 z-0 pointer-events-none"></div>

  <!-- Main Card Container -->
  <div class="relative z-10 w-full max-w-2xl px-6 animate-fade-in-up">
    
    <!-- Glassmorphism Effect -->
    <div class="backdrop-blur-xl bg-white/[0.02] border border-white/[0.05] rounded-3xl p-10 md:p-16 text-center shadow-[0_8px_32px_0_rgba(0,0,0,0.6)] ring-1 ring-amber-500/20 relative overflow-hidden">
      
      <!-- Subtle top border highlight -->
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-px bg-gradient-to-r from-transparent via-amber-500/50 to-transparent"></div>

      <!-- Eyebrow Badge -->
      <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-amber-500/10 border border-amber-500/20 mb-8 transition-colors hover:bg-amber-500/20 cursor-default">
        <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse shadow-[0_0_10px_rgba(245,158,11,0.8)]"></span>
        <span class="text-amber-500 text-xs font-semibold tracking-[0.2em] uppercase">By Invitation Only</span>
      </div>

      <!-- Heading -->
      <h1 class="font-cinzel text-5xl md:text-6xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-yellow-400 to-amber-700 drop-shadow-sm tracking-wide leading-tight">
        Excellence <br /> Refined
      </h1>

      <!-- Body Copy -->
      <p class="text-zinc-400 text-lg md:text-xl leading-relaxed mb-12 font-light max-w-lg mx-auto">
        Step into a world of unparalleled prestige. Secure your Gold, Platinum, or Diamond tier and unlock experiences crafted strictly for the elite.
      </p>

      <!-- Premium Call to Action Button -->
      <a href="form.html" class="group relative inline-flex items-center justify-center px-8 py-4 font-semibold text-black transition-all duration-500 bg-gradient-to-r from-amber-400 via-yellow-500 to-amber-600 rounded-full hover:scale-105 hover:shadow-[0_0_40px_rgba(245,158,11,0.4)] overflow-hidden">
        
        <!-- Button Shimmer Effect -->
        <span class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
        
        <span class="relative flex items-center gap-3 text-lg tracking-wide">
          Acquire Membership
          <!-- Animated SVG Arrow -->
          <svg class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </span>
      </a>

    </div>
  </div>
</body>
</html>
